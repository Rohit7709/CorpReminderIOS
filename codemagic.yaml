# Codemagic CI/CD configuration for CorpRemind iOS Application
# This configures an automated, zero-config machine runner to compile the Kotlin Multiplatform iOS framework
# and deliver a signed or unsigned iOS App (.ipa) directly to your Codemagic account.

workflows:
  ios-workflow:
    name: Build CorpRemind iOS Application
    max_build_duration: 60
    instance_type: mac_mini_m2 # High performance Apple Silicon build machine
    environment:
      java: 17
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: System Environment Diagnostics
        script: |
          echo "Checking software versions installed in Apple runner environment:"
          xcodebuild -version
          java -version
          
          # Regenerate the gradle-wrapper.jar natively to fix any local git corruption
          echo "Rebuilding clean native Gradle wrapper executable..."
          gradle wrapper
          
          chmod +x gradlew
          ./gradlew --version
      - name: Build Shared Kotlin Multiplatform Engine
        script: |
          echo "Building shared multiplatform Kotlin declarations..."
          # Generates mock/development frameworks so Xcode can link them correctly during compilation
          ./gradlew :shared:assemble
      - name: Configure and Compile iOS Native Bundle
        script: |
          echo "Compiling swift sources and building corporate application bundle..."
          
          # Initialize directory locations for build artifacts
          mkdir -p build/ios/ipa
          
          # Compile the scheme using xcodebuild (configured for simulator or ad-hoc test compilation)
          # We use "sdk iphonesimulator" to build a simulator release app (.app bundle)
          # which is easy to test or run, or ad-hoc builds if they supply credentials.
          # To ensure maximum compatibility for code verification, we execute an archive build
          # with code signing disabled so it succeeds universally without needing a paid Apple Developer Provisioning profile uploaded first. 
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build
            
          echo "iOS bundle compiled successfully under simulated sandbox signing."
    artifacts:
      - iosApp/build/Release-iphoneos/*.app
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - Rvjadhav1080p@gmail.com
        notify:
          success: true
          failure: true
