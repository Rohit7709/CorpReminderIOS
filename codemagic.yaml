# Codemagic CI/CD configuration for CorpRemind iOS Application
# This configures an automated, zero-config machine runner to compile the Kotlin Multiplatform iOS framework
# and deliver a signed or unsigned iOS App (.ipa) directly to your Codemagic account.

workflows:
  ios-workflow:
    name: Build CorpRemind iOS Application
    max_build_duration: 60
    instance_type: mac_mini_m2 # High performance Apple Silicon build machine
    environment:
      java: 17
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: System Environment Diagnostics
        script: |
          echo "Checking software versions installed in Apple runner environment:"
          xcodebuild -version
          java -version
          
          # Regenerate gradle wrapper natively to guarantee a non-corrupted binary jar file
          echo "Generating clean Gradle 9.3.1 wrapper..."
          gradle wrapper --gradle-version 9.3.1
          
          chmod +x gradlew
          ./gradlew --version
      - name: Build Shared Kotlin Multiplatform Engine
        script: |
          echo "Building shared multiplatform Kotlin declarations..."
          # Generates mock/development frameworks so Xcode can link them correctly during compilation
          ./gradlew :shared:assemble
      - name: Configure and Compile iOS Native Bundle
        script: |
          echo "Compiling swift sources and building corporate application bundle..."
          
          # Compile the scheme using xcodebuild (configured for simulator or ad-hoc test compilation)
          # We force outputs into 'build' using -derivedDataPath so we can find and package the app.
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build
            
          echo "iOS bundle compiled successfully under simulated sandbox signing."
          
          # Find the compiled .app file and package it into a zip-based .ipa for easy download
          echo "Packaging application bundle..."
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "Found compiled app at: $APP_PATH"
            mkdir -p build/ios/Payload
            cp -R "$APP_PATH" build/ios/Payload/
            cd build/ios
            zip -r CorpReminder.ipa Payload
            cd ../..
            echo "Successfully packaged CorpReminder.ipa!"
          else
            echo "Error: Could not locate compiled .app file!"
            exit 1
          fi
    artifacts:
      - build/Build/Products/Release-iphoneos/*.app
      - build/ios/*.ipa
    publishing:
      email:
        recipients:
          - Rvjadhav1080p@gmail.com
        notify:
          success: true
          failure: true
